<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Client Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
            boxShadow: {
              soft: "0 10px 30px rgba(0, 0, 0, 0.08)",
              softDark: "0 10px 30px rgba(0, 0, 0, 0.35)",
            },
          },
        },
      };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      .glass {
        backdrop-filter: blur(8px);
      }
    </style>
  </head>
  <body class="bg-zinc-100 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100">
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const STORAGE_KEY = "local-client-project-tracker-v1";
      const THEME_KEY = "local-client-project-tracker-theme";
      const STATUSES = ["In Progress", "Preparing", "Launched"];

      const formatMoney = (value) =>
        new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(Number(value || 0));

      const todayISO = () => new Date().toISOString().slice(0, 10);

      const createBlankProject = () => ({
        id: crypto.randomUUID(),
        clientName: "",
        projectName: "",
        status: "In Progress",
        totalPrice: 0,
        notes: "",
        createdDate: todayISO(),
        payments: [],
      });

      function ModalShell({ title, onClose, children }) {
        return (
          <div className="fixed inset-0 z-50 flex items-end justify-center overflow-y-auto bg-black/50 p-0 sm:items-center sm:p-4">
            <div className="glass flex h-[92dvh] w-full flex-col rounded-t-3xl border border-zinc-200 bg-white/95 shadow-soft transition-all sm:h-auto sm:max-h-[88dvh] sm:max-w-2xl sm:rounded-2xl dark:border-zinc-700 dark:bg-zinc-900/95 dark:shadow-softDark">
              <div className="flex items-center justify-between border-b border-zinc-200 px-4 py-4 sm:px-6 dark:border-zinc-700">
                <h2 className="text-lg font-semibold tracking-tight sm:text-xl">{title}</h2>
                <button
                  onClick={onClose}
                  className="rounded-lg border border-zinc-200 px-3 py-1.5 text-sm transition hover:bg-zinc-100 dark:border-zinc-700 dark:hover:bg-zinc-800"
                >
                  Close
                </button>
              </div>
              <div className="flex-1 overflow-y-auto px-4 py-4 sm:px-6 sm:py-5">{children}</div>
            </div>
          </div>
        );
      }

      function ProjectModal({ open, mode, initialProject, onClose, onSave }) {
        const [form, setForm] = useState(initialProject || createBlankProject());

        useEffect(() => {
          if (open) setForm(initialProject || createBlankProject());
        }, [open, initialProject]);

        if (!open) return null;

        const handleChange = (key, value) => setForm((prev) => ({ ...prev, [key]: value }));

        const paid = (form.payments || []).reduce((sum, p) => sum + Number(p.amount || 0), 0);
        const remaining = Number(form.totalPrice || 0) - paid;

        const submit = (e) => {
          e.preventDefault();
          if (!form.clientName.trim() || !form.projectName.trim()) return;
          onSave({
            ...form,
            totalPrice: Number(form.totalPrice || 0),
            payments: form.payments || [],
          });
        };

        return (
          <ModalShell title={mode === "edit" ? "Edit Project" : "Add Project"} onClose={onClose}>
            <form onSubmit={submit} className="grid grid-cols-1 gap-4 md:grid-cols-2">
              <label className="space-y-1">
                <span className="text-sm text-zinc-600 dark:text-zinc-400">Client Name</span>
                <input
                  required
                  value={form.clientName}
                  onChange={(e) => handleChange("clientName", e.target.value)}
                  className="w-full rounded-xl border border-zinc-300 bg-white px-3 py-2 outline-none transition focus:border-zinc-500 dark:border-zinc-700 dark:bg-zinc-900"
                />
              </label>

              <label className="space-y-1">
                <span className="text-sm text-zinc-600 dark:text-zinc-400">Project Name</span>
                <input
                  required
                  value={form.projectName}
                  onChange={(e) => handleChange("projectName", e.target.value)}
                  className="w-full rounded-xl border border-zinc-300 bg-white px-3 py-2 outline-none transition focus:border-zinc-500 dark:border-zinc-700 dark:bg-zinc-900"
                />
              </label>

              <label className="space-y-1">
                <span className="text-sm text-zinc-600 dark:text-zinc-400">Status</span>
                <select
                  value={form.status}
                  onChange={(e) => handleChange("status", e.target.value)}
                  className="w-full rounded-xl border border-zinc-300 bg-white px-3 py-2 outline-none transition focus:border-zinc-500 dark:border-zinc-700 dark:bg-zinc-900"
                >
                  {STATUSES.map((status) => (
                    <option key={status} value={status}>
                      {status}
                    </option>
                  ))}
                </select>
              </label>

              <label className="space-y-1">
                <span className="text-sm text-zinc-600 dark:text-zinc-400">Total Price</span>
                <input
                  type="number"
                  min="0"
                  step="0.01"
                  value={form.totalPrice}
                  onChange={(e) => handleChange("totalPrice", e.target.value)}
                  className="w-full rounded-xl border border-zinc-300 bg-white px-3 py-2 outline-none transition focus:border-zinc-500 dark:border-zinc-700 dark:bg-zinc-900"
                />
              </label>

              <label className="space-y-1">
                <span className="text-sm text-zinc-600 dark:text-zinc-400">Created Date</span>
                <input
                  type="date"
                  value={form.createdDate}
                  onChange={(e) => handleChange("createdDate", e.target.value)}
                  className="w-full rounded-xl border border-zinc-300 bg-white px-3 py-2 outline-none transition focus:border-zinc-500 dark:border-zinc-700 dark:bg-zinc-900"
                />
              </label>

              <div className="space-y-1">
                <span className="text-sm text-zinc-600 dark:text-zinc-400">Paid Amount</span>
                <div className="rounded-xl border border-zinc-200 bg-zinc-100 px-3 py-2 dark:border-zinc-700 dark:bg-zinc-800">
                  {formatMoney(paid)}
                </div>
              </div>

              <div className="space-y-1 md:col-span-2">
                <span className="text-sm text-zinc-600 dark:text-zinc-400">Remaining Amount</span>
                <div className="rounded-xl border border-zinc-200 bg-zinc-100 px-3 py-2 dark:border-zinc-700 dark:bg-zinc-800">
                  {formatMoney(Math.max(remaining, 0))}
                </div>
              </div>

              <label className="space-y-1 md:col-span-2">
                <span className="text-sm text-zinc-600 dark:text-zinc-400">Notes (optional)</span>
                <textarea
                  rows="3"
                  value={form.notes}
                  onChange={(e) => handleChange("notes", e.target.value)}
                  className="w-full rounded-xl border border-zinc-300 bg-white px-3 py-2 outline-none transition focus:border-zinc-500 dark:border-zinc-700 dark:bg-zinc-900"
                />
              </label>

              <button
                type="submit"
                className="md:col-span-2 rounded-xl bg-zinc-900 px-4 py-2.5 font-medium text-white transition hover:-translate-y-0.5 hover:bg-zinc-700 dark:bg-zinc-100 dark:text-zinc-900 dark:hover:bg-zinc-300"
              >
                {mode === "edit" ? "Save Changes" : "Create Project"}
              </button>
            </form>
          </ModalShell>
        );
      }

      function PaymentModal({ open, project, onClose, onAddPayment }) {
        const [amount, setAmount] = useState("");
        const [date, setDate] = useState(todayISO());
        const [note, setNote] = useState("");

        useEffect(() => {
          if (open) {
            setAmount("");
            setDate(todayISO());
            setNote("");
          }
        }, [open]);

        if (!open || !project) return null;

        const submit = (e) => {
          e.preventDefault();
          const parsed = Number(amount);
          if (!parsed || parsed <= 0) return;
          onAddPayment(project.id, { id: crypto.randomUUID(), amount: parsed, date, note });
          onClose();
        };

        return (
          <ModalShell title={`Add Payment - ${project.projectName}`} onClose={onClose}>
            <form onSubmit={submit} className="space-y-4">
              <label className="block space-y-1">
                <span className="text-sm text-zinc-600 dark:text-zinc-400">Amount</span>
                <input
                  type="number"
                  min="0"
                  step="0.01"
                  required
                  value={amount}
                  onChange={(e) => setAmount(e.target.value)}
                  className="w-full rounded-xl border border-zinc-300 bg-white px-3 py-2 outline-none transition focus:border-zinc-500 dark:border-zinc-700 dark:bg-zinc-900"
                />
              </label>

              <label className="block space-y-1">
                <span className="text-sm text-zinc-600 dark:text-zinc-400">Payment Date</span>
                <input
                  type="date"
                  value={date}
                  onChange={(e) => setDate(e.target.value)}
                  className="w-full rounded-xl border border-zinc-300 bg-white px-3 py-2 outline-none transition focus:border-zinc-500 dark:border-zinc-700 dark:bg-zinc-900"
                />
              </label>

              <label className="block space-y-1">
                <span className="text-sm text-zinc-600 dark:text-zinc-400">Note (optional)</span>
                <input
                  value={note}
                  onChange={(e) => setNote(e.target.value)}
                  className="w-full rounded-xl border border-zinc-300 bg-white px-3 py-2 outline-none transition focus:border-zinc-500 dark:border-zinc-700 dark:bg-zinc-900"
                />
              </label>

              <button
                type="submit"
                className="w-full rounded-xl bg-zinc-900 px-4 py-2.5 font-medium text-white transition hover:-translate-y-0.5 hover:bg-zinc-700 dark:bg-zinc-100 dark:text-zinc-900 dark:hover:bg-zinc-300"
              >
                Add Payment
              </button>
            </form>
          </ModalShell>
        );
      }

      function App() {
        const [projects, setProjects] = useState(() => {
          try {
            return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
          } catch {
            return [];
          }
        });
        const [query, setQuery] = useState("");
        const [statusFilter, setStatusFilter] = useState("All");
        const [expandedProjectId, setExpandedProjectId] = useState(null);
        const [projectModalState, setProjectModalState] = useState({ open: false, mode: "add", project: null });
        const [paymentModalProject, setPaymentModalProject] = useState(null);
        const [theme, setTheme] = useState(() => localStorage.getItem(THEME_KEY) || "light");

        useEffect(() => {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
        }, [projects]);

        useEffect(() => {
          const root = document.documentElement;
          if (theme === "dark") root.classList.add("dark");
          else root.classList.remove("dark");
          localStorage.setItem(THEME_KEY, theme);
        }, [theme]);

        const withComputed = useMemo(
          () =>
            projects.map((project) => {
              const paidAmount = (project.payments || []).reduce((sum, p) => sum + Number(p.amount || 0), 0);
              const remainingAmount = Math.max(Number(project.totalPrice || 0) - paidAmount, 0);
              return { ...project, paidAmount, remainingAmount };
            }),
          [projects]
        );

        const summary = useMemo(() => {
          const totalEarnings = withComputed.reduce((sum, p) => sum + p.paidAmount, 0);
          const totalPending = withComputed.reduce((sum, p) => sum + p.remainingAmount, 0);
          const activeProjects = withComputed.filter((p) => p.status === "In Progress").length;
          return { totalEarnings, totalPending, activeProjects };
        }, [withComputed]);

        const filteredProjects = useMemo(() => {
          const lower = query.trim().toLowerCase();
          return withComputed.filter((project) => {
            const statusOK = statusFilter === "All" ? true : project.status === statusFilter;
            const searchOK =
              !lower ||
              project.clientName.toLowerCase().includes(lower) ||
              project.projectName.toLowerCase().includes(lower);
            return statusOK && searchOK;
          });
        }, [withComputed, query, statusFilter]);

        const openCreate = () => setProjectModalState({ open: true, mode: "add", project: createBlankProject() });
        const openEdit = (project) => setProjectModalState({ open: true, mode: "edit", project });
        const closeProjectModal = () => setProjectModalState((prev) => ({ ...prev, open: false }));

        const saveProject = (project) => {
          setProjects((prev) => {
            const exists = prev.some((p) => p.id === project.id);
            if (exists) return prev.map((p) => (p.id === project.id ? project : p));
            return [project, ...prev];
          });
          closeProjectModal();
        };

        const deleteProject = (id) => {
          const ok = window.confirm("Delete this project and all its payment history?");
          if (!ok) return;
          setProjects((prev) => prev.filter((p) => p.id !== id));
          if (expandedProjectId === id) setExpandedProjectId(null);
        };

        const addPayment = (projectId, payment) => {
          setProjects((prev) =>
            prev.map((project) =>
              project.id === projectId ? { ...project, payments: [...(project.payments || []), payment] } : project
            )
          );
        };

        const removePayment = (projectId, paymentId) => {
          const ok = window.confirm("Remove this payment entry?");
          if (!ok) return;
          setProjects((prev) =>
            prev.map((project) =>
              project.id === projectId
                ? { ...project, payments: (project.payments || []).filter((payment) => payment.id !== paymentId) }
                : project
            )
          );
        };

        return (
          <div className="min-h-screen">
            <header className="sticky top-0 z-20 border-b border-zinc-200 bg-white/90 p-4 shadow-sm glass dark:border-zinc-800 dark:bg-zinc-950/90">
              <div className="mx-auto flex w-full max-w-7xl items-center justify-between">
                <div>
                  <h1 className="text-2xl font-semibold tracking-tight">Client & Project Tracker</h1>
                  <p className="text-sm text-zinc-500 dark:text-zinc-400">Local-only dashboard with payment tracking</p>
                </div>
                <div className="flex items-center gap-2">
                  <button
                    onClick={() => setTheme((prev) => (prev === "light" ? "dark" : "light"))}
                    className="rounded-xl border border-zinc-300 px-3 py-2 text-sm transition hover:bg-zinc-100 dark:border-zinc-700 dark:hover:bg-zinc-800"
                  >
                    {theme === "light" ? "Dark Mode" : "Light Mode"}
                  </button>
                  <button
                    onClick={openCreate}
                    className="rounded-xl bg-zinc-900 px-4 py-2 text-sm font-medium text-white transition hover:-translate-y-0.5 hover:bg-zinc-700 dark:bg-zinc-100 dark:text-zinc-900 dark:hover:bg-zinc-300"
                  >
                    + New Project
                  </button>
                </div>
              </div>
            </header>

            <main className="mx-auto w-full max-w-7xl space-y-6 p-4 md:p-6">
              <section className="grid grid-cols-1 gap-4 md:grid-cols-3">
                <div className="rounded-2xl border border-zinc-200 bg-white p-4 shadow-soft transition hover:-translate-y-0.5 dark:border-zinc-800 dark:bg-zinc-900 dark:shadow-softDark">
                  <p className="text-sm text-zinc-500 dark:text-zinc-400">Total Earnings</p>
                  <p className="mt-2 text-2xl font-semibold">{formatMoney(summary.totalEarnings)}</p>
                </div>
                <div className="rounded-2xl border border-zinc-200 bg-white p-4 shadow-soft transition hover:-translate-y-0.5 dark:border-zinc-800 dark:bg-zinc-900 dark:shadow-softDark">
                  <p className="text-sm text-zinc-500 dark:text-zinc-400">Total Pending</p>
                  <p className="mt-2 text-2xl font-semibold">{formatMoney(summary.totalPending)}</p>
                </div>
                <div className="rounded-2xl border border-zinc-200 bg-white p-4 shadow-soft transition hover:-translate-y-0.5 dark:border-zinc-800 dark:bg-zinc-900 dark:shadow-softDark">
                  <p className="text-sm text-zinc-500 dark:text-zinc-400">Active Projects</p>
                  <p className="mt-2 text-2xl font-semibold">{summary.activeProjects}</p>
                </div>
              </section>

              <section className="rounded-2xl border border-zinc-200 bg-white p-4 shadow-soft dark:border-zinc-800 dark:bg-zinc-900 dark:shadow-softDark">
                <div className="flex flex-col gap-3 md:flex-row md:items-center">
                  <input
                    placeholder="Search by client or project name..."
                    value={query}
                    onChange={(e) => setQuery(e.target.value)}
                    className="flex-1 rounded-xl border border-zinc-300 bg-white px-3 py-2 outline-none transition focus:border-zinc-500 dark:border-zinc-700 dark:bg-zinc-900"
                  />
                  <select
                    value={statusFilter}
                    onChange={(e) => setStatusFilter(e.target.value)}
                    className="rounded-xl border border-zinc-300 bg-white px-3 py-2 outline-none transition focus:border-zinc-500 dark:border-zinc-700 dark:bg-zinc-900"
                  >
                    <option value="All">All Statuses</option>
                    {STATUSES.map((status) => (
                      <option key={status} value={status}>
                        {status}
                      </option>
                    ))}
                  </select>
                </div>
              </section>

              <section className="space-y-4">
                {filteredProjects.length === 0 ? (
                  <div className="rounded-2xl border border-dashed border-zinc-300 bg-white p-10 text-center shadow-soft dark:border-zinc-700 dark:bg-zinc-900 dark:shadow-softDark">
                    <h3 className="text-xl font-semibold">No projects yet</h3>
                    <p className="mt-2 text-zinc-500 dark:text-zinc-400">
                      Start by adding your first client project to track payments and balances.
                    </p>
                    <button
                      onClick={openCreate}
                      className="mt-5 rounded-xl bg-zinc-900 px-4 py-2 font-medium text-white transition hover:-translate-y-0.5 hover:bg-zinc-700 dark:bg-zinc-100 dark:text-zinc-900 dark:hover:bg-zinc-300"
                    >
                      Create Your First Project
                    </button>
                  </div>
                ) : (
                  filteredProjects.map((project) => (
                    <article
                      key={project.id}
                      className="rounded-2xl border border-zinc-200 bg-white p-4 shadow-soft transition hover:-translate-y-0.5 dark:border-zinc-800 dark:bg-zinc-900 dark:shadow-softDark"
                    >
                      <div className="flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
                        <div>
                          <h3 className="text-lg font-semibold">{project.projectName}</h3>
                          <p className="text-sm text-zinc-600 dark:text-zinc-400">{project.clientName}</p>
                          <div className="mt-2 flex flex-wrap items-center gap-2 text-xs">
                            <span className="rounded-full border border-zinc-300 px-2 py-1 dark:border-zinc-700">
                              {project.status}
                            </span>
                            <span className="rounded-full border border-zinc-300 px-2 py-1 dark:border-zinc-700">
                              Created {project.createdDate}
                            </span>
                          </div>
                        </div>
                        <div className="grid grid-cols-3 gap-3 text-sm md:min-w-[380px]">
                          <div className="rounded-xl border border-zinc-200 p-2 text-center dark:border-zinc-700">
                            <p className="text-xs text-zinc-500 dark:text-zinc-400">Total</p>
                            <p className="font-semibold">{formatMoney(project.totalPrice)}</p>
                          </div>
                          <div className="rounded-xl border border-zinc-200 p-2 text-center dark:border-zinc-700">
                            <p className="text-xs text-zinc-500 dark:text-zinc-400">Paid</p>
                            <p className="font-semibold">{formatMoney(project.paidAmount)}</p>
                          </div>
                          <div className="rounded-xl border border-zinc-200 p-2 text-center dark:border-zinc-700">
                            <p className="text-xs text-zinc-500 dark:text-zinc-400">Remaining</p>
                            <p className="font-semibold">{formatMoney(project.remainingAmount)}</p>
                          </div>
                        </div>
                      </div>

                      {project.notes ? (
                        <p className="mt-3 rounded-xl border border-zinc-200 bg-zinc-50 px-3 py-2 text-sm text-zinc-700 dark:border-zinc-700 dark:bg-zinc-800 dark:text-zinc-300">
                          {project.notes}
                        </p>
                      ) : null}

                      <div className="mt-4 flex flex-wrap gap-2">
                        <button
                          onClick={() => openEdit(project)}
                          className="rounded-lg border border-zinc-300 px-3 py-1.5 text-sm transition hover:bg-zinc-100 dark:border-zinc-700 dark:hover:bg-zinc-800"
                        >
                          Edit
                        </button>
                        <button
                          onClick={() => setPaymentModalProject(project)}
                          className="rounded-lg border border-zinc-300 px-3 py-1.5 text-sm transition hover:bg-zinc-100 dark:border-zinc-700 dark:hover:bg-zinc-800"
                        >
                          Add Payment
                        </button>
                        <button
                          onClick={() =>
                            setExpandedProjectId((prev) => (prev === project.id ? null : project.id))
                          }
                          className="rounded-lg border border-zinc-300 px-3 py-1.5 text-sm transition hover:bg-zinc-100 dark:border-zinc-700 dark:hover:bg-zinc-800"
                        >
                          {expandedProjectId === project.id ? "Hide Payments" : "View Payments"}
                        </button>
                        <button
                          onClick={() => deleteProject(project.id)}
                          className="rounded-lg border border-zinc-900 bg-zinc-900 px-3 py-1.5 text-sm text-white transition hover:bg-zinc-700 dark:border-zinc-100 dark:bg-zinc-100 dark:text-zinc-900 dark:hover:bg-zinc-300"
                        >
                          Delete
                        </button>
                      </div>

                      {expandedProjectId === project.id ? (
                        <div className="mt-4 rounded-xl border border-zinc-200 p-3 dark:border-zinc-700">
                          <h4 className="mb-2 text-sm font-semibold">Payment History</h4>
                          {(project.payments || []).length === 0 ? (
                            <p className="text-sm text-zinc-500 dark:text-zinc-400">No payments added yet.</p>
                          ) : (
                            <div className="space-y-2">
                              {[...(project.payments || [])]
                                .sort((a, b) => (a.date < b.date ? 1 : -1))
                                .map((payment) => (
                                  <div
                                    key={payment.id}
                                    className="flex items-center justify-between rounded-lg border border-zinc-200 px-3 py-2 text-sm dark:border-zinc-700"
                                  >
                                    <div>
                                      <p className="font-medium">{formatMoney(payment.amount)}</p>
                                      <p className="text-zinc-500 dark:text-zinc-400">
                                        {payment.date} {payment.note ? `- ${payment.note}` : ""}
                                      </p>
                                    </div>
                                    <button
                                      onClick={() => removePayment(project.id, payment.id)}
                                      className="rounded-lg border border-zinc-300 px-2 py-1 text-xs transition hover:bg-zinc-100 dark:border-zinc-700 dark:hover:bg-zinc-800"
                                    >
                                      Remove
                                    </button>
                                  </div>
                                ))}
                            </div>
                          )}
                        </div>
                      ) : null}
                    </article>
                  ))
                )}
              </section>
            </main>

            <ProjectModal
              open={projectModalState.open}
              mode={projectModalState.mode}
              initialProject={projectModalState.project}
              onClose={closeProjectModal}
              onSave={saveProject}
            />
            <PaymentModal
              open={Boolean(paymentModalProject)}
              project={paymentModalProject}
              onClose={() => setPaymentModalProject(null)}
              onAddPayment={addPayment}
            />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
